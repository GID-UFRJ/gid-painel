<span x-data="{ open: false }">
    <a @click.prevent="open = !open" 
       href="javascript:void(0)" 
       class="text-decoration-none ms-1"
       style="color: #003366;"
       title="Ver informações adicionais">
        <i class="fas fa-info-circle"></i>
    </a>

    <!-- A mágica acontece aqui: x-collapse -->
    <div x-show="open" x-collapse class="mt-2 w-100" style="display: none;">
        <div class="card card-body shadow-sm mb-3"
             style="font-size: 0.85em; color: #555; background-color: #f8f9fa; border: 1px solid #ced4da; border-left: 4px solid #003366; border-radius: 0.375rem;">
            <div class="texto-explicativo-grafico m-0 p-0">
                {{ texto|safe }}
            </div>
        </div>
    </div>
</span>
