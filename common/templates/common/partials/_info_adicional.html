<div x-data="{ open: false }" class="d-inline-block ms-1">
    <a @click.prevent="open = !open" 
       href="javascript:void(0)" 
       class="text-decoration-none ms-1"
       :class="open ? 'text-danger' : 'text-warning'"
       title="Ver informações adicionais">
        <i class="fas" :class="open ? 'fa-times-circle' : 'fa-exclamation-circle'"></i>
    </a>

    <div x-show="open" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 transform -translate-y-2"
         x-transition:enter-end="opacity-100 transform translate-y-0"
         @click.away="open = false"
         class="card card-body bg-light border-start border-warning border-4 shadow-sm mt-2 mb-3">
        <div class="d-flex align-items-start">
            <i class="fas fa-info-circle text-warning me-2 mt-1"></i>
            <div class="small text-dark">
                {{ texto|safe }}
            </div>
        </div>
    </div>
</div>
