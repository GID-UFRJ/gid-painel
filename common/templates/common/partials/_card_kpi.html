<div class="card shadow-sm border-0 h-100 kpi-card">
    <div class="card-body">
        <div class="d-flex align-items-center">
            {% if icone %}
            <div class="flex-shrink-0 me-3">
                <i class="{{ icone }} fa-2x kpi-icon" 
                   style="color: {{ cor|default:'#4169E1' }} !important;"></i>
            </div>
            {% endif %}
            <div>
                <h6 class="text-muted mb-1 text-uppercase fw-bold kpi-label" 
                    style="border-left: 3px solid {{ cor|default:'#4169E1' }}; padding-left: 8px;">
                    {{ rotulo }}
                </h6>
                <h2 class="mb-0 fw-bold kpi-value">
                    {{ valor }}
                    {% if sufixo %}<small class="text-muted"> {{ sufixo }}</small>{% endif %}
                </h2>
            </div>
        </div>
    </div>
</div>
