{# common/partials/_indice_graficos.html #}

{# Só renderiza se o plotter existir E tiver 2 ou mais gráficos #}
{% if plotter and plotter.lista_sumario|length >= 2 %}
<div class="card shadow-sm mb-4 border-0 bg-light" style="position: sticky; top: 20px; z-index: 1000;">
    <div class="card-body py-2">
        <div class="d-flex align-items-center flex-wrap gap-2">
            <span class="fw-bold text-muted me-2">
                <i class="fas fa-list-ul me-1"></i> Ir para:
            </span>
            
            {% for grafico in plotter.lista_sumario %}
                <a href="#{{ grafico.id }}" class="btn btn-sm btn-outline-primary rounded-pill">
                    {{ grafico.titulo }}
                </a>
            {% endfor %}
        </div>
    </div>
</div>
{% endif %}
