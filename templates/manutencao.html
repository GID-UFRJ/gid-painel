<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema em Atualização</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .maintenance-card {
            max-width: 520px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card maintenance-card p-5 mx-auto bg-white">
            <div class="mb-4 text-primary">
                <i class="bi bi-gear-wide-connected display-4"></i>
            </div>
            <h1 class="h4 fw-bold mb-3">Atualizando os Indicadores</h1>
            <p class="text-muted mb-4 small">
                Estamos processando a base de dados mais recente para garantir que os painéis reflitam as informações mais precisas. O sistema estará disponível novamente em alguns instantes.
            </p>
            <div class="spinner-border spinner-border-sm text-primary mb-3" role="status">
                <span class="visually-hidden">Atualizando...</span>
            </div>
            <div>
                <button onclick="window.location.reload()" class="btn btn-outline-secondary btn-sm mt-3">
                    <i class="bi bi-arrow-clockwise me-1"></i> Tentar Novamente
                </button>
            </div>
        </div>
    </div>
</body>
</html>
